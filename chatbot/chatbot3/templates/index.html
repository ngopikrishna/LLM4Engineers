<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot3</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --accent:       #7c3aed;
            --accent-hover: #6d28d9;
            --bg:           #f3f4f6;
            --surface:      #ffffff;
            --border:       #e5e7eb;
            --text:         #111827;
            --muted:        #6b7280;
            --error:        #ef4444;
            --success:      #22c55e;
            --user-bg:      #ede9fe;
            --user-border:  #c4b5fd;
            --bot-bg:       #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────────── */
        header {
            background: var(--accent);
            color: #fff;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        header h1  { font-size: 1.1rem; font-weight: 700; }
        header span { font-size: 0.8rem; opacity: 0.85; }

        /* ── Layout ───────────────────────────────────────────── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ──────────────────────────────────────────── */
        .sidebar {
            width: 290px;
            min-width: 290px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-block {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-block h3 {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--muted);
            margin-top: 10px;
            margin-bottom: 3px;
        }
        label:first-of-type { margin-top: 0; }

        label .optional {
            font-weight: 400;
            font-style: italic;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            color: var(--text);
            background: #fff;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(124,58,237,.15);
        }
        textarea { resize: vertical; }

        .param-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .param-grid > div { display: flex; flex-direction: column; }
        .param-grid label { margin-top: 0; }

        .clear-btn {
            width: 100%;
            padding: 8px;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .clear-btn:hover { background: #fecaca; }

        /* ── Main chat area ───────────────────────────────────── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .status-bar {
            padding: 5px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }
        .status-dot.loading {
            background: var(--accent);
            animation: pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Conversation thread ──────────────────────────────── */
        .conversation {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            border: 1px solid var(--border);
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border-color: var(--user-border);
        }
        .message.assistant {
            align-self: flex-start;
            background: var(--bot-bg);
        }
        .message.assistant.streaming {
            border-color: var(--accent);
        }
        .message .role-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .message.error {
            align-self: flex-start;
            background: #fee2e2;
            border-color: #fecaca;
            color: var(--error);
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-style: italic;
            font-size: 0.9rem;
        }

        /* ── Input row ────────────────────────────────────────── */
        .input-section {
            padding: 12px 16px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .input-row textarea {
            flex: 1;
            min-height: 60px;
            max-height: 140px;
            resize: none;
        }
        .send-btn {
            padding: 9px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            height: fit-content;
            transition: background 0.15s;
        }
        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .hint {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 6px;
        }
    </style>
</head>
<body>

<header>
    <h1>Chatbot3</h1>
    <span>Powered by {{ cfg.MODEL }} (Ollama) &nbsp;·&nbsp; Conversation mode (history maintained)</span>
</header>

<div class="layout">

    <!-- ── Sidebar ────────────────────────────────────────────── -->
    <aside class="sidebar">

        <div class="sidebar-block">
            <h3>System Prompt</h3>
            <textarea id="system_prompt" rows="6"
                placeholder="Instructions for the model...">{{ cfg.SYSTEM_PROMPT }}</textarea>
        </div>

        <div class="sidebar-block">
            <h3>Model</h3>
            <label for="model">Model Name</label>
            <input type="text" id="model" value="{{ cfg.MODEL }}"
                   placeholder="e.g. llama3, phi4">
        </div>

        <div class="sidebar-block">
            <h3>Parameters</h3>

            <div class="param-grid">
                <div>
                    <label for="num_predict">Max Tokens</label>
                    <input type="number" id="num_predict"
                           value="{{ cfg.NUM_PREDICT }}" min="1" max="32000">
                </div>
                <div>
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature"
                           value="{{ cfg.TEMPERATURE }}" min="0" max="2" step="0.01">
                </div>
                <div>
                    <label for="top_p">Top P <span class="optional">(opt)</span></label>
                    <input type="number" id="top_p"
                           placeholder="default" min="0" max="1" step="0.01">
                </div>
                <div>
                    <label for="top_k">Top K <span class="optional">(opt)</span></label>
                    <input type="number" id="top_k"
                           placeholder="default" min="1" step="1">
                </div>
            </div>
        </div>

        <div class="sidebar-block">
            <h3>History</h3>
            <button class="clear-btn" onclick="clear_history()">Clear Conversation</button>
        </div>

    </aside>

    <!-- ── Chat area ──────────────────────────────────────────── -->
    <div class="chat-area">

        <div class="status-bar">
            <div class="status-dot" id="status_dot"></div>
            <span id="status_text">Ready</span>
        </div>

        <div class="conversation" id="conversation">
            <div class="empty-state" id="empty_state">
                No messages yet — start the conversation below
            </div>
        </div>

        <div class="input-section">
            <div class="input-row">
                <textarea id="user_prompt"
                    placeholder="Type your message… (Ctrl+Enter to send)"
                    onkeydown="handle_key_down(event)"></textarea>
                <button class="send-btn" id="send_btn" onclick="send_message()">
                    Send
                </button>
            </div>
            <p class="hint">Ctrl+Enter to send &nbsp;·&nbsp; Full history is sent with each message</p>
        </div>

    </div>
</div>

<script>
    // ── DOM helpers ───────────────────────────────────────────────

    function set_status(is_loading, message) {
        const dot  = document.getElementById('status_dot');
        const text = document.getElementById('status_text');
        dot.className = 'status-dot' + (is_loading ? ' loading' : '');
        text.textContent = message;
    }

    function hide_empty_state() {
        const el = document.getElementById('empty_state');
        if (el) el.remove();
    }

    function append_message(role, text, streaming = false) {
        hide_empty_state();
        const conv = document.getElementById('conversation');
        const div  = document.createElement('div');
        div.className = `message ${role}${streaming ? ' streaming' : ''}`;

        const label = document.createElement('div');
        label.className = 'role-label';
        label.textContent = role === 'user' ? 'You' : 'Assistant';

        const content = document.createElement('div');
        content.className = 'message-content';
        content.textContent = text;

        div.appendChild(label);
        div.appendChild(content);
        conv.appendChild(div);
        conv.scrollTop = conv.scrollHeight;
        return div;
    }

    function append_error(text) {
        hide_empty_state();
        const conv = document.getElementById('conversation');
        const div  = document.createElement('div');
        div.className = 'message error';
        div.textContent = 'Error: ' + text;
        conv.appendChild(div);
        conv.scrollTop = conv.scrollHeight;
    }

    // ── Params ───────────────────────────────────────────────────

    function get_params(user_prompt) {
        const raw_top_p = document.getElementById('top_p').value.trim();
        const raw_top_k = document.getElementById('top_k').value.trim();
        return {
            system_prompt: document.getElementById('system_prompt').value,
            user_prompt,
            model:         document.getElementById('model').value.trim(),
            num_predict:   parseInt(document.getElementById('num_predict').value, 10),
            temperature:   parseFloat(document.getElementById('temperature').value),
            top_p: raw_top_p !== '' ? parseFloat(raw_top_p) : null,
            top_k: raw_top_k !== '' ? parseInt(raw_top_k, 10) : null,
        };
    }

    function handle_key_down(event) {
        if (event.ctrlKey && event.key === 'Enter') {
            event.preventDefault();
            send_message();
        }
    }

    // ── Send ─────────────────────────────────────────────────────

    async function send_message() {
        const textarea  = document.getElementById('user_prompt');
        const user_text = textarea.value.trim();

        if (!user_text) {
            alert('Please enter a message.');
            return;
        }

        const send_btn = document.getElementById('send_btn');
        send_btn.disabled = true;
        textarea.value   = '';

        // Show user bubble immediately.
        append_message('user', user_text);
        set_status(true, 'Thinking…');

        // Create streaming assistant bubble.
        const bot_bubble = append_message('assistant', '', true);
        const content_el = bot_bubble.querySelector('.message-content');

        try {
            const response = await fetch('/chat', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(get_params(user_text)),
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const reader  = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;

                    const raw = line.slice(6).trim();
                    if (raw === '[DONE]') break;

                    try {
                        const parsed = JSON.parse(raw);
                        if (parsed.text) {
                            content_el.textContent += parsed.text;
                            document.getElementById('conversation').scrollTop =
                                document.getElementById('conversation').scrollHeight;
                        } else if (parsed.error) {
                            bot_bubble.remove();
                            append_error(parsed.error);
                        }
                    } catch (_) { /* ignore malformed SSE chunks */ }
                }
            }

            bot_bubble.classList.remove('streaming');
            set_status(false, 'Done');

        } catch (err) {
            bot_bubble.remove();
            append_error('Network error: ' + err.message);
            set_status(false, 'Error');
        } finally {
            send_btn.disabled = false;
            textarea.focus();
        }
    }

    // ── Clear ─────────────────────────────────────────────────────

    async function clear_history() {
        await fetch('/clear', { method: 'POST' });

        const conv = document.getElementById('conversation');
        conv.innerHTML = '';

        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.id = 'empty_state';
        empty.textContent = 'No messages yet — start the conversation below';
        conv.appendChild(empty);

        set_status(false, 'Ready');
    }

    // Focus the prompt on load
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('user_prompt').focus();
    });
</script>

</body>
</html>
